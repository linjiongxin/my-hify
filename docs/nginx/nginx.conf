# Hify Nginx 配置文件
# 适用于：生产环境 / 本地 Docker Compose / 前后端同 Pod 部署
#
# SSE 关键配置说明：
# - proxy_buffering off    : 关闭响应缓冲，SSE 数据立即下发
# - proxy_cache off        : 关闭缓存
# - proxy_read_timeout 600s: SSE 长连接读取超时
# - proxy_send_timeout 600s: SSE 长连接发送超时
# - proxy_http_version 1.1 : 使用 HTTP/1.1 支持 keep-alive
# - proxy_set_header Connection "" : 保持长连接

upstream hify_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name localhost;

    # 静态资源（前端 Vue 构建产物）
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires -1;
    }

    # API 请求（Spring Boot 后端）
    location /api/ {
        proxy_pass http://hify_backend;

        # SSE 关键配置
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 长连接超时（必须大于 LLM 最长响应时间）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 大文件上传（知识库文档）
        client_max_body_size 100M;
    }

    # SSE 流式接口单独配置（可选，更细粒度控制）
    location /api/chat/stream/ {
        proxy_pass http://hify_backend;

        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE 专用超时
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Actuator 健康检查
    location /api/actuator/health {
        proxy_pass http://hify_backend;
        proxy_read_timeout 10s;
    }
}
