# 生产环境配置
# 通过环境变量驱动数据源和 Redis 连接

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:hify}?useUnicode=true&characterEncoding=utf-8&sslmode=disable
    username: ${DB_USERNAME:hify}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: HifyProdHikariCP

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 60000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 10000ms
      redisson:
        config: |
          singleServerConfig:
            address: "redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}"
            database: 0
            password: "${REDIS_PASSWORD:}"

logging:
  level:
    root: WARN
    com.hify: INFO
    org.springframework.web: WARN
    org.springframework.jdbc: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{X-Request-ID}] %logger{36} - %msg%n"
  file:
    name: /var/log/hify/hify-server.log
    max-history: 30
    max-size: 100MB

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
