services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: hify-postgres
    environment:
      POSTGRES_DB: hify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/sql/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    command: postgres -c timezone=Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: m.daocloud.io/docker.io/redis:7-alpine
    container_name: hify-redis
    command: redis-server --requirepass hify123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "hify123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Nginx 反向代理（可选，本地测试 SSE 代理场景）
  # 启用后访问 http://localhost:80 而非 http://localhost:8080
  nginx:
    image: nginx:alpine
    container_name: hify-nginx
    ports:
      - "80:80"
    volumes:
      - ./docs/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # 本地开发时后端在宿主机 8080，通过 host.docker.internal 访问
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
    profiles:
      - nginx  # docker compose --profile nginx up -d 启用

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
