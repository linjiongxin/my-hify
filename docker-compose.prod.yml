# Hify 生产环境 Docker Compose
# 一键部署全栈：PostgreSQL + Redis + 后端 + 前端
#
# 使用方式：
#   docker compose -f docker-compose.prod.yml up -d
#
# 说明：
# - 通过 extends 复用 docker-compose.yml 的 postgres 和 redis 服务定义
# - 新增 server（Spring Boot）和 web（Nginx）服务
# - 生产环境使用非 root 用户、资源限制、健康检查

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: hify-postgres
    environment:
      POSTGRES_DB: hify
      POSTGRES_USER: hify
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hify123}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/sql/init:/docker-entrypoint-initdb.d
    command: postgres -c timezone=Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hify"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped

  redis:
    image: m.daocloud.io/docker.io/redis:7-alpine
    container_name: hify-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-hify123}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hify123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: hify-server
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hify
      DB_USERNAME: hify
      DB_PASSWORD: ${DB_PASSWORD:-hify123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-hify123}
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:+UseG1GC"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: hify-web
    ports:
      - "80:80"
    depends_on:
      - server
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
